<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEGAANA | Events</title>
    <link rel="stylesheet" href="../styles.css">
    <meta name="description"
        content="Upcoming events for College of Engineering, Guindy Alumni Association of North America.">
</head>

<body>
    <header>
        <h1><a href="../index.html"><img src="../cegaana_logo.jpg" alt="CEGAANA Logo" class="header-logo"></a></h1>
    </header>

    <div class="container">
        <!-- <h2 class="section-title">All Events</h2> -->

        <div class="toggle-switch-container">
            <span class="toggle-label" id="label-cards">Cards</span>
            <label class="switch">
                <input type="checkbox" id="view-toggle-checkbox" checked>
                <span class="slider round"></span>
            </label>
            <span class="toggle-label active" id="label-flyer">Flyer</span>
        </div>

        <div class="grid" id="all-events-list">
            <!-- Events will be populated here by JavaScript -->
        </div>

        <div style="text-align: center; margin-top: 2rem;">
            <a href="../index.html" class="btn">Back to Home</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 College of Engineering, Guindy Alumni Association of North America (CEGAANA).
            All Rights Reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let allEvents = [];
            let currentView = 'flyer';
            
            const eventsGrid = document.getElementById('all-events-list');
            const toggleCheckbox = document.getElementById('view-toggle-checkbox');
            const labelCards = document.getElementById('label-cards');
            const labelFlyer = document.getElementById('label-flyer');

            toggleCheckbox.addEventListener('change', (e) => {
                if (e.target.checked) {
                    currentView = 'flyer';
                    labelFlyer.classList.add('active');
                    labelCards.classList.remove('active');
                } else {
                    currentView = 'cards';
                    labelCards.classList.add('active');
                    labelFlyer.classList.remove('active');
                }
                renderEvents();
            });

            function renderEvents() {
                eventsGrid.innerHTML = '';
                if (allEvents && allEvents.length > 0) {
                    allEvents.forEach((event, index) => {
                        const dateStr = new Date(event.date).toLocaleDateString(undefined, { 
                            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
                        });
                        
                        const timeStr = event.timeLabel ? event.timeLabel : new Date(event.date).toLocaleTimeString(undefined, {
                            hour: '2-digit', minute: '2-digit'
                        });

                        const card = document.createElement('div');

                        if (currentView === 'cards') {
                            let panelistsHTML = '';
                            if (event.panelists && event.panelists.length > 0) {
                                const links = event.panelists.map(p => `<a href="${p.url}" target="_blank" rel="noopener noreferrer">${p.name}</a>`).join(', ');
                                panelistsHTML = `<p style="margin: 5px 0;">🎙 <strong>Panelists:</strong> ${links}</p>`;
                            }

                            const cardTint = (index % 4) + 1;
                            card.className = `card card-tint-${cardTint}`;
                            card.innerHTML = `
                                <h4 style="margin-bottom: 10px;">${event.title}</h4>
                                <div style="font-size: 0.95em; color: #444; margin-bottom: 15px;">
                                    <p style="margin: 5px 0;">📅 <strong>Date:</strong> ${dateStr}</p>
                                    <p style="margin: 5px 0;">⏰ <strong>Time:</strong> ${timeStr}</p>
                                    <p style="margin: 5px 0;">📍 <strong>Mode:</strong> ${event.location}</p>
                                    ${panelistsHTML}
                                </div>
                                <p style="margin-bottom: 20px;">${event.description}</p>
                                <a href="${event.url}" class="btn" target="_blank" rel="noopener noreferrer" style="margin-top: auto;">🔗 Join Event</a>
                            `;
                            card.style.display = 'flex';
                            card.style.flexDirection = 'column';
                        } else {
                            let panelistsNamesHTML = '';
                            if (event.panelists && event.panelists.length > 0) {
                                panelistsNamesHTML = event.panelists.map(p => `<p class="card-rich-names"><a href="${p.url}" target="_blank" rel="noopener noreferrer">${p.name}</a></p>`).join('');
                                panelistsNamesHTML = `<div class="card-rich-section-title" style="margin-top: 10px;">FEATURED PANELISTS</div>${panelistsNamesHTML}`;
                            }
                            
                            // Highlight format: Split title on colon if present, or just highlight the last word
                            let formattedTitle = event.title;
                            if (formattedTitle.includes(':')) {
                                formattedTitle = formattedTitle.replace(':', '<br><span class="card-rich-highlight">') + '</span>';
                            } else {
                                const words = formattedTitle.split(' ');
                                if (words.length > 1) {
                                    const last = words.pop();
                                    formattedTitle = words.join(' ') + ` <span class="card-rich-highlight">${last}</span>`;
                                }
                            }

                            card.className = `card-rich`;
                            card.innerHTML = `
                                <div class="card-rich-grid"></div>
                                <div class="card-rich-header">
                                    <img src="../cegaana-square-logo.jpg" class="card-rich-logo" alt="CEGAANA">
                                    <div class="card-rich-org">CEGAANA PRESENTS</div>
                                </div>
                                <h1 class="card-rich-title">${formattedTitle.toUpperCase()}</h1>
                                <div class="card-rich-info-box">
                                    <p class="card-rich-info-text">${dateStr.toUpperCase()} &bull; ${timeStr.toUpperCase()}</p>
                                    <p class="card-rich-info-sub">📍 LIVE ON ${event.location.toUpperCase()}</p>
                                </div>
                                ${panelistsNamesHTML}
                                <div class="card-rich-topics">${event.description}</div>
                                <a href="${event.url}" class="card-rich-btn" target="_blank" rel="noopener noreferrer">JOIN EVENT</a>
                            `;
                        }
                        
                        eventsGrid.appendChild(card);
                    });
                } else {
                    eventsGrid.innerHTML = '<p>No upcoming events at this time.</p>';
                }
            }

            fetch('./events_list.json')
                .then(response => response.json())
                .then(events => {
                    allEvents = events;
                    renderEvents();
                })
                .catch(error => {
                    console.error('Error fetching events:', error);
                    document.getElementById('all-events-list').innerHTML = '<p>Error loading events. Please try again later.</p>';
                });
        });
    </script>
</body>

</html>
