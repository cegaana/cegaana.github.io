<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEGAANA Event Poster</title>
  <style>
    body {
      margin: 0;
      background-color: #050914;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .card {
      width: 100%;
      max-width: 450px;
      aspect-ratio: 9 / 16;
      background: linear-gradient(180deg, #0B132B 0%, #1C2541 100%);
      border: 1px solid #3A506B;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 40px 20px;
      box-sizing: border-box;
      box-shadow: 0 10px 40px rgba(0, 242, 254, 0.15);
      position: relative;
      overflow: hidden;
    }

    /* Tech Grid Background */
    .grid {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 100% 40px;
      pointer-events: none;
    }

    .org {
      color: #4FACFE;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 3px;
      margin-bottom: 20px;
      margin-top: 10px;
      z-index: 1;
    }

    .title {
      font-size: 40px;
      font-weight: 900;
      line-height: 1.1;
      margin: 0 0 10px 0;
      z-index: 1;
      color: white;
    }

    .highlight {
      background: linear-gradient(90deg, #4FACFE, #00F2FE);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #A0B2C6;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1.5px;
      margin-bottom: 35px;
      z-index: 1;
    }

    .info-box {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid #4FACFE;
      border-radius: 16px;
      padding: 20px;
      width: 85%;
      margin-bottom: 40px;
      z-index: 1;
    }

    .info-text {
      color: white;
      font-weight: 800;
      font-size: 20px;
      margin: 0 0 8px 0;
    }

    .info-sub {
      color: #4FACFE;
      font-weight: 600;
      font-size: 15px;
      margin: 0;
    }

    .section-title {
      color: white;
      font-weight: 800;
      font-size: 18px;
      margin-bottom: 15px;
      z-index: 1;
    }

    .names {
      color: #00F2FE;
      font-weight: 600;
      font-size: 22px;
      margin: 5px 0;
      z-index: 1;
    }

    .topics {
      color: #E0E0E0;
      font-size: 14px;
      line-height: 1.7;
      margin-top: 30px;
      z-index: 1;
    }

    .btn {
      margin-top: auto;
      background: linear-gradient(90deg, #4FACFE, #00F2FE);
      color: #0B132B;
      font-weight: 800;
      padding: 14px 40px;
      border-radius: 30px;
      font-size: 16px;
      z-index: 1;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="grid"></div>

    <h1 class="title">HOW TO CRACK<br><span class="highlight">ML & AI ROLES</span></h1>
    <div class="subtitle">A CAREER PANEL FOR NEW GRADUATES</div>

    <div class="info-box">
      <p class="info-text">MAY 29 • 6:00 PM PST</p>
      <p class="info-sub">📍 LIVE ON GOOGLE MEET</p>
    </div>

    <div class="section-title">FEATURED PANELISTS</div>
    <p class="names">Deepak Nulu</p>
    <p class="names">Ishwarya Sivakumar</p>

    <div class="topics">
      2026 Hiring Trends • Resume Strategies<br>
      International Student Tips • Interview Prep<br>
      Projects & Networking
    </div>

  </div>
</body>

</html>
